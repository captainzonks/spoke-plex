# ==============================================================================
# PLEX MODULE - TRAEFIK SERVICES
# ==============================================================================
# Description: Traefik dynamic service definitions for the plex module
# Author: Matt Barham
# Created: 2026-02-12
# Modified: 2026-04-21
# Version: 1.0.1
# Host: Your Server
# ==============================================================================
# Type: Traefik Dynamic Config (services)
# Component: module: plex
# ==============================================================================

http:
  services:
    plex-svc:
      loadBalancer:
        servers:
          - url: http://plex:32400
        passHostHeader: true
        serversTransport: plex-transport

    tautulli-svc:
      loadBalancer:
        servers:
          - url: http://tautulli:8181
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s

  serversTransports:
    plex-transport:
      forwardingTimeouts:
        dialTimeout: 30s
        responseHeaderTimeout: 0s
        idleConnTimeout: 90s
      maxIdleConnsPerHost: 100
